name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Build and Package
        run: ./package.sh
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: LogitechPreciseVolumeRoller.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
