name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Build and Package
        run: ./package.sh
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "Logitech.Precise.Volume.Roller-*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

